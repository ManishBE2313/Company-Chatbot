services:
  # 1. The Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  # 2. Your AI FastAPI Backend
  backend:
    build: .                 # Changed from ./backend to . (current folder)
    container_name: ai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env                 # Changed from ./backend/.env to .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    restart: always

volumes:
  qdrant_data: