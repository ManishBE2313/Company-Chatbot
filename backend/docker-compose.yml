services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  redis:
    image: redis:7-alpine
    container_name: company_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build: .
    container_name: ai_backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_HOST=redis
      - FASTAPI_PORT=8001
      - FASTAPI_BASE_URL=http://backend:8001
    depends_on:
      - qdrant
      - redis
    restart: always

volumes:
  qdrant_data:
  redis_data: